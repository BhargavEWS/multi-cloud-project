# App-of-apps: this is the only Application applied manually (by the deploy
# workflow). It manages everything else declaratively from git — the actual
# GitOps loop.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sowmyak12/multi-cloud-project.git
    targetRevision: main
    path: gitops/argocd/apps/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
