# One-time config: enables the kv engine + kubernetes auth, writes a demo
# secret and a policy/role scoped to the vault-demo service account. Retries
# until Vault is reachable so it doesn't matter if this lands before or after
# the Vault pod is Ready.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after Vault server itself
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              value: "root-demo-token" # dev-mode root token, see values.yaml
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              until vault status >/dev/null 2>&1; do
                echo "waiting for vault..."; sleep 5
              done

              vault secrets enable -path=secret kv-v2 || true
              vault kv put secret/taskflow/config db_password=demo-super-secret-value

              vault auth enable kubernetes || true
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443"

              vault policy write taskflow-read - <<POLICY
              path "secret/data/taskflow/*" {
                capabilities = ["read"]
              }
              POLICY

              vault write auth/kubernetes/role/taskflow-demo \
                bound_service_account_names=vault-demo \
                bound_service_account_namespaces=vault \
                policies=taskflow-read \
                ttl=1h

              echo "vault init complete"
