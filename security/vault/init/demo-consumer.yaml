# Standalone proof that Vault Agent injection works end-to-end, kept isolated
# from taskflow-api so a Vault misconfiguration can never take the demo app down.
apiVersion: v1
kind: Pod
metadata:
  name: vault-demo-consumer
  annotations:
    argocd.argoproj.io/sync-wave: "2" # after vault-init has written the role/policy
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "taskflow-demo"
    vault.hashicorp.com/agent-inject-secret-config.txt: "secret/data/taskflow/config"
spec:
  serviceAccountName: vault-demo
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 30 && echo '--- secret fetched by vault agent ---' && cat /vault/secrets/config.txt && sleep 3600"]
